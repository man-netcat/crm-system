<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}email-parser{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #222; line-height: 1.5; }
    nav { background: #1a1a2e; color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
    nav a { color: #fff; text-decoration: none; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    nav .brand { font-size: 1.2rem; font-weight: 700; }
    .container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 1.5rem; margin-bottom: 1rem; }
    .card h2 { margin-bottom: .75rem; }
    .flash { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    .flash-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .table-wrap { overflow-x: auto; margin-top: .5rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .5rem; border-bottom: 1px solid #eee; white-space: nowrap; }
    th { font-weight: 600; color: #555; font-size: .85rem; text-transform: uppercase; }
    tr:hover { background: #fafafa; }
    .badge { display: inline-block; background: #e9ecef; border-radius: 12px; padding: .15rem .6rem; font-size: .8rem; color: #555; }
    .btn { display: inline-block; padding: .5rem 1rem; border-radius: 6px; text-decoration: none; font-size: .9rem; cursor: pointer; border: none; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #16213e; }
    .btn-outline { background: transparent; border: 1px solid #1a1a2e; color: #1a1a2e; }
    .btn-outline:hover { background: #1a1a2e; color: #fff; }
    .btn-sm { padding: .3rem .6rem; font-size: .8rem; }
    .meta { color: #888; font-size: .85rem; }
    .actions { display: flex; gap: .5rem; flex-wrap: wrap; }
    label { display: block; font-weight: 600; margin-bottom: .25rem; }
    input, textarea, select { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: 6px; font-size: .9rem; font-family: inherit; }
    textarea { min-height: 120px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .json-view { background: #f8f9fa; border: 1px solid #eee; border-radius: 6px; padding: 1rem; font-family: "SF Mono", "Fira Code", monospace; font-size: .85rem; white-space: pre-wrap; max-height: 400px; overflow: auto; }
    .score { font-weight: 600; }
    .score-good { color: #28a745; }
    .score-bad { color: #dc3545; }
    .empty { color: #888; font-style: italic; padding: 2rem 0; text-align: center; }

    /* Overlay spinner */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 999; align-items: center; justify-content: center; }
    .overlay.active { display: flex; }
    .overlay-card { background: #fff; border-radius: 12px; padding: 2rem 3rem; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.15); }
    .spinner { width: 40px; height: 40px; border: 4px solid #e9ecef; border-top-color: #1a1a2e; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="brand">email-parser</a>
    <a href="{{ url_for('index') }}">Schemas</a>
    <a href="{{ url_for('schema_new') }}">New Schema</a>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="overlay">
    <div class="overlay-card">
      <div class="spinner"></div>
      <div id="loadingText">Generating...</div>
    </div>
  </div>

  <script>
    document.querySelectorAll('form').forEach(function(form) {
      form.addEventListener('submit', function(e) {
        var btn = form.querySelector('button[type="submit"]');
        if (btn && btn.dataset.nooverlay) return;
        document.getElementById('loadingOverlay').classList.add('active');
      });
    });
    window.addEventListener('load', function() {
      document.getElementById('loadingOverlay').classList.remove('active');
    });
  </script>
</body>
</html>
